name: Build and Package Classworks Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          # LanMountainDesktop and its plugins target .NET 10; use the latest 10.x version.
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ClassworksPlugin/ClassworksPlugin.csproj

      - name: Build
        run: dotnet build ClassworksPlugin/ClassworksPlugin.csproj --configuration Release --no-restore

      - name: Pack plugin directory
        run: |
          cd ClassworksPlugin
          zip -r ../ClassworksPlugin.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ClassworksPlugin
          path: ClassworksPlugin.zip